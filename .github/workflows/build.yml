name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore InfoDive.sln -r win-x64

      - name: Build
        run: dotnet build InfoDive.sln -c Release --no-restore

      - name: Check NuGet vulnerabilities
        run: dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln.txt; if (Select-String -Path vuln.txt -Pattern "has the following vulnerable packages") { exit 1 }
        shell: pwsh

      - name: Test
        run: dotnet test InfoDive.sln -c Release --no-build --verbosity normal
